ai_prompt: "Письма avtoformula сопровождаются актом ТОРГ-2 (вложение akt*.xls; его\
  \ текст дописан в письмо).\nРЕАЛЬНАЯ причина возврата — в строке акта «мнение комиссии\
  \ о причинах их образования»:\n  «Отказ»/«Отказ клиента» → quality_refusal;\n  «Недопоставка»/«недостача»\
  \ → shortage;\n  «сломано»/«не работает»/«разбит»/«отсутствует» → defect;\n  «Честный\
  \ знак не совпадает»/«коды маркировки» → marking_request.\nНЕ бери «обнаружено несоответствие»\
  \ из шапки письма как причину — это шаблонная фраза.\ndocument_number — из «УПД\
  \ №…», document_date — дата УПД, количество — из таблицы акта.\n"
