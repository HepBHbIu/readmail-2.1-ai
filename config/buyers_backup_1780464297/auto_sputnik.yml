buyer:
  code: auto_sputnik
  name: Авто-Спутник
  enabled: true
  aliases:
    domains:
    - '@auto-sputnik.ru'
    senders:
    - ClaimsTosuppliers@auto-sputnik.ru
    subject_contains:
    - претензия
    - поставщику
    - по документу
    body_contains:
    - Авто-Спутник импорт
    - причина претензии
    - создана претензия
statuses:
  wrong_item:
  - пересорт
  - причина претензии пересорт
  - не соответствует КМ
  - пересортица
  defect:
  - брак
  - дефект
  quality_refusal:
  - отказ клиента
  shortage:
  - недовоз
  - недопоставка
  - недостача
  nonconforming:
  - некондиция
  - не соответствует км
  - повреждение
  - товарный вид
fields:
  regex:
    client_request_number:
    - претензи[яи]\s*№\s*([A-ZА-Я0-9\-/]+)
    - Претензия\s*№\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    - претензия\s*№\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    document_number:
    - по\s+документу\s*№\s*([A-ZА-Я0-9\-/]+)
    - (?:(?:УПД|накладн[аяой]+|документ[еу]?|счёт-фактур[аеу]?|заказ[еу]?|счёт|реализаци[яею]+)\s*(?:№|#)?\s*)\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{6,31})(?=[А-ЯЁа-яё])
    document_date:
    - по\s+документу\s*№\s*[A-ZА-Я0-9\-/]+\s*от\s*([0-9]{1,2}[.\-/][0-9]{1,2}[.\-/][0-9]{2,4})
    - (?:(?:от|дата)\s+)\s*(\d{1,2}[.\-/]\d{1,2}[.\-/]\d{2,4}|\d{4}-\d{2}-\d{2})
    part_number:
    - Причина претензии\s*\d+\s*\|\s*([^|]+?)\s*\|
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})(?=[A-Za-z])
    - (?<=№ Артикул\s)([A-Za-z0-9]+)
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=[A-Za-z])
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=[A-Za-z])
    brand:
    - Причина претензии\s*\d+\s*\|[^|]+\|\s*([^|]+?)\s*\|
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,23})
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=[А-ЯЁа-яё])
    - '"TestBrand"'
    - (?<=Производитель\s)([A-Za-z]+)
    product_name:
    - Причина претензии\s*\d+\s*\|[^|]+\|[^|]+\|\s*([^|]+?)\s*\|
    - 151117421850BMW\s*\#\s*([^\n\r]{3,80})
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{15,40}?)(?=\d)'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{8,33}?)(?=\d)'
    - (?<=Номенклатура\s)(.*?)(?=\sКоличество\sзаказано)
    - (?<=Номенклатура\s)([^\s]+)
    - '[A-Za-z]+(Вал\ карданный\ MERCEDES\ Sprinter\ \(906\)\ 2006\-2018)(?=\d)'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{2,27}?)(?=\d)'
    quantity:
    - Причина претензии\s*\d+\s*\|[^|]+\|[^|]+\|[^|]+\|\s*(\d+)\s*\|
    claim_number:
    - создана\s+претензи[яи]\s*№\s*([A-ZА-Я0-9\-/]+)
    - (?:(?:претензи[яюи]|рекламаци[яюи]|заявка)[:\s]*(?:№|#)?\s*)\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{6,31})(?=[А-ЯЁа-яё])
    comment:
    - \d+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{8,33}?)(?=[А-ЯЁа-яё])
    - '[А-ЯЁа-яё]+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{8,33}?)(?=\d)'
required_documents:
- акт пересорта
- фото маркировки
- ТОРГ-12
field_extractors: []
processing_types:
  follow_up_request:
  - ожидаем решение
  - ожидаем ответ
  - что по претензии
  - где решение
  document_update:
  - во вложении
  - прилагаем документы
