buyer:
  code: autorus_ru
  name: Авторусь
  enabled: true
  aliases:
    domains:
    - '@autorus.ru'
    senders:
    - zakaz@autorus.ru
    folders: []
    subject_contains:
    - нет марки
    - марка
    - УПД
    body_contains:
    - выгрузить в ЭДО марку
    - нужна марка
    - буфер маркировок
statuses:
  quality_refusal:
  - нет марки
  - нужна марка
  - выгрузить в ЭДО марку
  - маркировка
  - честный знак
processing_types:
  marking_request:
  - нет марки
  - нужна марка
  - выгрузить в ЭДО марку
  - марку по УПД
fields:
  regex:
    document_number:
    - (?:УПД)\s*№?\s*([0-9]{4,})
    - (?:(?:УПД|накладн[аяой]+|документ[еу]?|счёт-фактур[аеу]?|заказ[еу]?|счёт|реализаци[яею]+)\s*(?:№|#)?\s*)\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    marking_code:
    - (?:нужна\s+марка|марка)\s*(?:№|:|=|—|-)?\s*([A-ZА-Я0-9._\/-]{3,40})
required_documents:
- маркировка / Честный знак / ЭДО
field_extractors:
- field: marking_code
  type: next_token
  after: Нужна марка
