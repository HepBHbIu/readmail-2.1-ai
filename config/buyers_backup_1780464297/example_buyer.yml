buyer:
  code: example_buyer
  name: Пример покупателя
  enabled: true
  aliases:
    folders:
      - Возвраты/Пример покупателя
      - example_buyer
    domains:
      - "@example.ru"
    senders:
      - returns@example.ru
    subject_contains:
      - возврат
      - претензия
      - рекламация
    body_contains:
      - артикул
      - заказ
      - причина
    attachment_contains:
      - акт
      - торг
      - упд
      - возврат
    file_formats:
      - xlsx
      - xlsm
      - csv
      - pdf
      - jpg
      - png

statuses:
  quality_refusal:
    - отказ качественной
    - не подошло
  shortage:
    - недовоз
    - недопоставка
    - не хватает
  defect:
    - брак
    - дефект
    - гарантийный случай
  wrong_item:
    - пересорт
    - не тот артикул
  nonconforming:
    - некондиция
    - повреждена упаковка
    - товарный вид

priority_rules:
  - priority: critical
    body_contains:
      - суд
      - штраф
      - крайний срок
  - priority: high
    body_contains:
      - срочно
      - претензия
      - дедлайн

required_documents:
  - ТОРГ-12
  - УПД
  - акт возврата
  - фото

extractors:
  xlsx:
    sheet_contains:
      - возврат
      - претензия
      - реализация
    header_keywords:
      - Артикул
      - Код
      - Количество
      - Причина
      - Заказ
    columns_map:
      - part_number=Артикул
      - quantity=Количество
      - reason=Причина
      - order_number=Заказ

fields:
  regex:
    order_number:
      - "(?:заказ|накладная|реализация)\\s*№?\\s*[:#-]?\\s*([A-ZА-Я0-9\\-/]+)"
    return_number:
      - "(?:возврат|претензия|рекламация)\\s*№?\\s*[:#-]?\\s*([A-ZА-Я0-9\\-/]+)"
    part_number:
      - "(?:артикул|код детали|oem)\\s*[:#-]?\\s*([A-ZА-Я0-9\\-.\\/]+)"
    quantity:
      - "(?:кол-?во|количество|шт\\.?|штук)\\s*[:#-]?\\s*(\\d+(?:[,.]\\d+)?)"
