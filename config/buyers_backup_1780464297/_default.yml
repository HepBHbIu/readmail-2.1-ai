buyer:
  code: unknown_buyer
  name: Неизвестный покупатель
  enabled: false
  aliases:
    domains: []
    senders: []
    subject_contains: []
    body_contains: []

statuses:
  defect:
    - брак
    - дефект
    - неисправность
  nonconforming:
    - некондиция
    - нетоварный вид
    - повреждена упаковка
    - без маркировки
  wrong_item:
    - пересорт
    - не тот товар
    - неверный артикул
  shortage:
    - недовоз
    - не довезли
    - отсутствует позиция
  overdelivery:
    - излишек
    - лишний товар
  correction_request:
    - корректировочный документ
    - УКД
    - КСФ
  marking_request:
    - маркировка
    - честный знак

fields:
  regex:
    document_number:
      - '(?:УПД|сч[её]т[- ]?фактура|накладная|заказ)\s*(?:№|#)?\s*([0-9A-Za-zА-Яа-я\-_/]{4,40})'
    part_number:
      - '(?:артикул|код товара|номенклатура)\s*[:#№\- ]+([A-Z0-9._/\-]{3,50})'
    quantity:
      - '(?:количество|кол-во)\s*[:= ]+(\d+(?:[,.]\d+)?)'
