buyer:
  code: motexc_ru
  name: MOTEXC
  enabled: true
  aliases:
    domains:
    - '@motexc.ru'
    senders:
    - supplier.return@motexc.ru
    subject_contains:
    - Согласование возврата
    - MOTEXC
    - возврат
    body_contains:
    - Согласование возврата
    - возврат
    attachment_contains:
    - xls
    - xlsx
    - pdf
statuses:
  quality_refusal:
  - согласование возврата
  - возврат заказных товаров
  defect:
  - брак
  - дефект
  wrong_item:
  - пересорт
  shortage:
  - недопоставка
  nonconforming:
  - некондиция
processing_types:
  new_return:
  - Согласование возврата
  - возврат заказных товаров
fields:
  regex:
    brand:
    - Бренд \| Артикул \|[^\n]*\n([^|\n]+)
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})'
    part_number:
    - Бренд \| Артикул \|[^\n]*\n[^|\n]*\|([^|\n]+)
    - Артикул\s*[:№]?\s*([A-ZА-Я0-9][A-ZА-Я0-9._\/-]{2,40})
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})
    - (?:(?:арт\.?|p/?n)\s*[:\-]?\s*)\s*([A-ZА-Я0-9][A-ZА-Яa-zA-Z0-9._\-/]{1,40})
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=\d)
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{6,31})(?=[А-ЯЁа-яё])
    product_name:
    - Бренд \| Артикул \|[^\n]*\n(?:[^|\n]*\|){2}([^|\n]+)
    - (?:(?:деталь|наименовани[еяю]|номенклатур[аеу]|товар)[:\s\-]*)\s*([^\n\r]{3,80})
    quantity:
    - Бренд \| Артикул \|[^\n]*\n(?:[^|\n]*\|){5}([^|\n]+)
    document_number:
    - Бренд \| Артикул \|[^\n]*\n(?:[^|\n]*\|){10}([^|\n]+)
    - Вн\.\s*Номер\s*[:=]?\s*([0-9]{4,})
    - (?:(?:УПД|накладн[аяой]+|документ[еу]?|счёт-фактур[аеу]?|заказ[еу]?|счёт|реализаци[яею]+)\s*(?:№|#)?\s*)\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    document_date:
    - Бренд \| Артикул \|[^\n]*\n(?:[^|\n]*\|){14}(\d{4}-\d{2}-\d{2})
    - \b(20\d{2}-\d{2}-\d{2})\b
    - (?:(?:от|дата)\s+)\s*(\d{1,2}[.\-/]\d{1,2}[.\-/]\d{2,4}|\d{4}-\d{2}-\d{2})
    comment:
    - '[А-ЯЁа-яё]+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{7,32}?)(?=[А-ЯЁа-яё])'
    - '[А-ЯЁа-яё]+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{1,25}?)(?=[А-ЯЁа-яё])'
    - ([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{3,28}?)(?=[А-ЯЁа-яё])
required_documents:
- файл согласования возврата
