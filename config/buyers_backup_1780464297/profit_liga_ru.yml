buyer:
  code: profit_liga_ru
  name: Профит-Лига / PR-LG
  enabled: true
  aliases:
    domains:
    - '@pr-lg.ru'
    senders:
    - robot@pr-lg.ru
    - noreply@pr-lg.ru
    - vozvrat@pr-lg.ru
    - reclamaciya.priemka@pr-lg.ru
    - returns@pr-lg.ru
    subject_contains:
    - Профит
    - Профит-Лига
    - PR-LG
    - pr-lg
    - Заявка на возврат
    - Проведен возврат
    - Проведён возврат
    - Возврат товара
    - Возврат товаров
    body_contains:
    - Заявка на возврат
    - Проведен возврат товара
    - Проведён возврат товара
    - Отказ покупателя
    - Отказ клиента
    - Возврат проведен
    - Возврат проведён
    - тип возврата
    - счет-фактура
    - счёт-фактура
    attachment_contains:
    - xls
    - xlsx
    - pdf
statuses:
  quality_refusal:
  - отказ покупателя
  - отказ клиента
  - тип возврата отказ покупателя
  defect:
  - брак
  - дефект
  shortage:
  - недопоставка
  - недовоз
  number_replacement:
  - замена номера/бренда
  wrong_item:
  - пересорт
  nonconforming:
  - некондиция
  - нетоварный вид
processing_types:
  new_return:
  - заявка на возврат
  - возврат товаров
  - возврат товара
  supplier_decision:
  - проведен возврат товара
  - проведён возврат товара
  - возврат проведен
  - возврат проведён
  followup_dialog:
  - есть решение по возврату
  - что по возврату
  - ждем ответ
  - ждём ответ
  correction_document_request:
  - корректировочную счет-фактуру
  - корректировочную счёт-фактуру
  - укд
  - ксф
fields:
  regex:
    return_number:
    - Заявка\s+на\s+возврат\s*№?\s*([0-9]{4,})
    - Возврат\s+товар(?:а|ов)\s*№?\s*([А-ЯA-Z0-9-]{4,})
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=[А-ЯЁа-яё])
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{2,27})(?=[А-ЯЁа-яё])
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})(?=[А-ЯЁа-яё])'
    client_request_number:
    - Заявка\s+на\s+возврат\s*№?\s*([0-9]{4,})
    - (?:(?:заявк[аи]|обращени[ея]|входящ[ийего]*|вх\.?)[:\s]*(?:№|#)?\s*)\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    - возврат\s*:\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    document_number:
    - сч[её]т[- ]?фактур[аеы]?\s*№?\s*([0-9]{4,})
    - документ[ау]?\s*№?\s*([0-9]{4,})
    - накладн(?:ая|ой)\s*№?\s*([0-9]{4,})
    - поступления\s*:\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    - (?:(?:№|#)\s*)\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=[А-ЯЁа-яё])'
    - Возврат по документу @ ([0-9]+) от
    - Документ\s*:\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})(?=[А-ЯЁа-яё])'
    document_date:
    - от\s+([0-9]{1,2}[.\-/][0-9]{1,2}[.\-/][0-9]{2,4})
    - (?:(?:от|дата)\s+)\s*(\d{1,2}[.\-/]\d{1,2}[.\-/]\d{2,4}|\d{4}-\d{2}-\d{2})
    - от ([0-9]{2}\.[0-9]{2}\.[0-9]{4})
    part_number:
    - Артикул\s*[:№]?\s*([A-ZА-Я0-9][A-ZА-Я0-9._\/-]{2,40})
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{5,30})(?=[A-Za-z])
    - (?:(?:артикул[а-яё]*|код[а-яё]*|oem|партномер)[:\s]*)\s*([A-ZА-Я0-9][A-ZА-Яa-zA-Z0-9._\-/]{1,40})
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{3,28})(?=[A-Za-z])
    - приемке\s*:\s*([A-ZА-Я0-9][A-ZА-Яa-zA-Z0-9._\-/]{1,40})
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=[A-Za-z])
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})(?=[A-Za-z])
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{6,31})(?=[A-Za-z])
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{2,27})(?=[A-Za-z])
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{2,27})(?=[A-Za-z])
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{3,28})(?=[A-Za-z])'
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{2,27})(?=[А-ЯЁа-яё])'
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=[A-Za-z])'
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=[A-Za-z])
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{9,34})(?=[A-Za-z])
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{3,28})(?=[A-Za-z])'
    quantity:
    - Кол(?:-во|ичество)\s*[:=]?\s*(\d+(?:[,.]\d+)?)
    - Количество\nв \nодном \nместе\n7\n([0-9]+),000
    price:
    - Цена\s*[:=]?\s*([0-9 ]+(?:[,.][0-9]{2})?)
    brand:
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,24})(?=[A-Za-z])'
    - (?:(?:произво?дите?л[ья]|бренд|поставщик|марк[аеи])[:\s]*)\s*([A-Za-z][A-Za-zА-Яа-я0-9\s\-]{0,30})
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=[А-ЯЁа-яё])'
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{1,24})(?=[А-ЯЁа-яё])'
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=[А-ЯЁа-яё])
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{8,33})(?=[A-Za-z])'
    - \d+\s*(DPA\ \(DIAMOND\))(?=[A-Za-z])
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=[А-ЯЁа-яё])
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=[A-Za-z])'
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{3,28})(?=[А-ЯЁа-яё])
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})'
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{2,27})(?=[А-ЯЁа-яё])
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{2,27})(?=[А-ЯЁа-яё])'
    - \d+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=[A-Za-z])
    comment:
    - Причина\s*:\s*([^\n\r]{4,160})
    - товару\s*:\s*([^\n\r]{4,160})
    - (?:(?:причина\s+(?:клиента|возврата|обращения|брака|претензии)?|комментарий|описание|неисправность|дефект)[:\s\-]*)\s*([^\n\r]{4,160})
    - кондиционера\s*\-\s*([^\n\r]{4,160})
    - Претензия\s*/\s*([^\n\r]{4,160})
    product_name:
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{37,62}?)'
    - (?:(?:деталь|наименовани[еяю]|номенклатур[аеу]|товар)[:\s\-]*)\s*([^\n\r]{3,80})
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{18,43}?)'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{1,26}?)(?=\d)'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{14,39}?)(?=[A-Za-z])'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{1,26}?)'
    - DIAMOND\s*\)\s*([^\n\r]{3,80})
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{12,37}?)(?=[A-Za-z])'
    - '[A-Za-z]+(Смазка\ алюминиевая\ антизадирная\ 3,\ аэрозоль,\ 650\ мл)(?=\d)'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{30,55}?)(?=[A-Za-z])'
    - \d+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{29,54}?)(?=[А-ЯЁа-яё])
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{10,35}?)'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{20,45}?)(?=[А-ЯЁа-яё])'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{43,68}?)'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{40,65}?)'
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{40,65}?)(?=\d)'
    - \d+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{8,33}?)
    claim_number:
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=[А-ЯЁа-яё])
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})(?=[А-ЯЁа-яё])'
required_documents:
- УПД/накладная или номер счета-фактуры
