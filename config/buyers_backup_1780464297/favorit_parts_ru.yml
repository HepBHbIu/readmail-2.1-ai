buyer:
  code: favorit_parts_ru
  name: Фаворит Parts
  enabled: true
  aliases:
    domains:
    - '@favorit-parts.ru'
    senders:
    - reclaim@favorit-parts.ru
    - Reclaim@favorit-parts.ru
    subject_contains:
    - Заявка на возврат поставщику
    - С резервных складов
    body_contains:
    - видео предоставьте
    - фото неинформативны
    - Заявка на возврат поставщику
    - Примите у нас данный возврат
