    - Заявка\s+на\s+возврат\s+поставщику\s*№?\s*([0-9]+)
    - Заявк[ауы]\s+на\s+возврат\s+поставщику\s*№?\s*([0-9]+)
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{3,28})(?=[А-ЯЁа-яё])'
    return_number:
    - Заявк[ауы]\s+на\s+возврат\s+поставщику\s*№?\s*([0-9]+)
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{3,28})(?=[А-ЯЁа-яё])'
    document_number:
    - ^\s*\d+\.\s*([0-9]{4,})\s+от\s+[0-9]{1,2}\s+[а-яё]+\s+[0-9]{4}
    - ^\s*\d+\.\s*([0-9]{4,})\s+от\s+[0-9]{1,2}[.\-/][0-9]{1,2}[.\-/][0-9]{2,4}
    - 'Заявка\s+на\s+возврат\s+поставщику\s+[0-9]+\s+от\s+[0-9.: ]+.*?\n\s*\d+\.\s*([0-9]{4,})'
    - номер\s*:\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    - "(\b82168\b)"
    - ([0-9]+)\s+от\s+\d{2}\s+[а-я]{3}\s+\d{4}
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{3,28})(?=[А-ЯЁа-яё])'
    - ([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=[А-ЯЁа-яё])
    document_date:
    - ^\s*\d+\.\s*[0-9]{4,}\s+от\s+([0-9]{1,2}\s+[а-яё]+\s+[0-9]{4})
    - ^\s*\d+\.\s*[0-9]{4,}\s+от\s+([0-9]{1,2}[.\-/][0-9]{1,2}[.\-/][0-9]{2,4})
    - №\s*[0-9]+\s*от\s*([0-9]{1,2}\s+[а-яё]+\s+[0-9]{4})
    - (?:(?:дата|date)\s*[:\-]?\s*)\s*(\d{1,2}[.\-/]\d{1,2}[.\-/]\d{2,4}|\d{4}-\d{2}-\d{2})
    - (?:(?:от|дата)\s+)\s*(\d{1,2}[.\-/]\d{1,2}[.\-/]\d{2,4}|\d{4}-\d{2}-\d{2})
    brand:
    - ^\s*\d+\.\s*[0-9]{4,}\s+от\s+(?:[0-9]{1,2}\s+[а-яё]+\s+[0-9]{4}|[0-9]{1,2}[.\-/][0-9]{1,2}[.\-/][0-9]{2,4})\s+(?:Отказ|Брак|Недопоставка|Недовоз|Некондиция|Пересорт)\s+([A-ZА-ЯЁ0-9._/-]+)\s+[A-Z0-9]
