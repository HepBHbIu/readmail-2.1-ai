  - отказ клиента
  - заявка на возврат
  - Отказ
  - Примите у нас данный возврат
  defect:
  - дефект
  - брак
  shortage:
  - недопоставка
  - недовоз
  nonconforming:
  - некондиция
processing_types:
  evidence_request:
  - фото неинформативны
  - жду видео
  - предоставьте видео
  - видео выгрузки
  - видео предоставьте
  follow_up_request:
  - просим проверить
  - ждем ответ
  - ждём ответ
  - жду от вас ответ
  new_return:
  - Заявка на возврат поставщику
  - Примите у нас данный возврат
fields:
  regex:
