buyer:
  code: ixora_auto_ru
  name: Ixora Auto
  enabled: true
  aliases:
    domains:
    - '@ixora-auto.ru'
    senders: []
    folders:
    - Возвраты Berru|ixora-auto.ru
    subject_contains:
    - возврат
    - претенз
    body_contains:
    - возврат
    - брак
statuses:
  defect:
  - брак
  - дефект
  nonconforming:
  - некондиция
  - нетоварный вид
  wrong_item:
  - пересорт
  - не тот артикул
  shortage:
  - недовоз
  - не довезли
  quality_refusal:
  - отказ клиента
  - отказ от товара
fields:
  regex:
    document_number:
    - (?:УПД|счет|документ|накладн[аяой])\s*№?\s*([0-9]{4,})
    part_number:
    - (?:артикул|кат\.?\s*номер|кат\.)\s*[:\s]*([A-Za-z0-9._\/-]{3,})
    - \b([A-Z]{1,6}[0-9][A-Z0-9\-]{2,20})\b
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})(?=[А-ЯЁа-яё])'
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{3,28})(?=[А-ЯЁа-яё])'
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{2,27})(?=[А-ЯЁа-яё])'
    - '[A-Za-z]+([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=[А-ЯЁа-яё])'
    brand:
    - \b([A-ZА-ЯЁ][a-zа-яёA-Z]{2,19})\s+(?:[A-Z]{1,6}[0-9][A-Z0-9\-]{2,20})\b
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,25})(?=[A-Za-z])'
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,23})(?=[A-Za-z])'
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=[A-Za-z])'
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{4,29})(?=[A-Za-z])'
    - RUR\s*\)\s*([A-Za-z][A-Za-zА-Яа-я0-9\s\-]{0,30})
    - '[А-ЯЁа-яё]+\s*([A-Za-z0-9][A-Za-z0-9._/\-]{1,26})(?=\d)'
    product_name:
    - (?:наименование|деталь|товар)\s*[:#-]\s*([^\n\r]{4,80})
    - \d+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{54,79}?)
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{20,45}?)'
    - \d+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{45,70}?)
    - \d+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{44,69}?)
    - \d+\s*([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{13,38}?)(?=[A-Za-z])
    - '[A-Za-z]+([А-ЯЁа-яё][А-ЯЁа-яё\s\-\.]{38,63}?)'
    client_request_number:
    - TicketID\s*:\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
    comment:
    - (?:(?:причина\s+(?:клиента|возврата|обращения|брака|претензии)?|комментарий|описание|неисправность|дефект)[:\s\-]*)\s*([^\n\r]{4,160})
    - день\s*!\s*([^\n\r]{4,160})
    document_date:
    - (?:(?:от|дата)\s+)\s*(\d{1,2}[.\-/]\d{1,2}[.\-/]\d{2,4}|\d{4}-\d{2}-\d{2})
    return_number:
    - согласовать\s*\.\s*([\dА-ЯA-Z][\w\-/\.]{0,30})
required_documents:
- фото
